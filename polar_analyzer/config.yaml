name: "Polar Analyzer"
description: "Learns boat polars from live SignalK sailing data and publishes real-time performance metrics"
version: "0.1.0"
slug: "polar_analyzer"
url: "https://github.com/eburi/polar_analyzer"
image: ghcr.io/eburi/polar_analyzer/{arch}
init: false
arch:
  - aarch64
  - amd64
startup: "application"
boot: "auto"
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:sail-boat"
panel_title: "Polar Analyzer"
ports:
  "8099/tcp": null
ports_description:
  "8099/tcp": "Web UI (not required when using Ingress)"
map:
  - "addon_config:rw"
options:
  signalk_url: "http://homeassistant.local:3000"
  log_level: "info"
schema:
  signalk_url: "url"
  log_level: "list(debug|info|warning|error)"
